<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="690" viewBox="0 0 1440 690" role="img" aria-labelledby="title desc">
<title id="title">Human-AI learning evaluation workflow</title><desc id="desc">Conceptual workflow for comparing feedback modes, measuring learning outcomes, trust, dependence, fairness, and human review.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff8f1"/><stop offset="1" stop-color="#f2f6ff"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#23395a" flood-opacity=".16"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#5b6f91"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:31px;font-weight:700;fill:#1f2d4d}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#5b6f86}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#5a60b5}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#1f2d4d}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#4c607a}.small{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#748497}.white{font-family:Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;fill:#fff}</style></defs>
<rect width="1440" height="690" fill="url(#bg)"/><text x="70" y="70" class="h">Evaluation workflow: benefit without dependence or unfairness</text><text x="70" y="102" class="s">The lab compares AI feedback conditions while explicitly tracking trust calibration, over-reliance, and subgroup fairness.</text><line x1="70" y1="132" x2="1370" y2="132" stroke="#d9e2f0"/>
<g filter="url(#shadow)"><rect x="82" y="192" width="250" height="335" rx="20" fill="#fff" stroke="#cbd7e6"/><text x="110" y="230" class="tag">EXPERIMENT</text><text x="110" y="272" class="t">Feedback conditions</text><text x="110" y="306" class="b">No feedback</text><text x="110" y="332" class="b">Generic feedback</text><text x="110" y="358" class="b">Adaptive feedback</text><text x="110" y="384" class="b">Overhelpful feedback</text><rect x="110" y="426" width="190" height="58" rx="12" fill="#eef5ff"/><text x="128" y="451" class="small">Purpose:</text><text x="128" y="471" class="small">compare learning and risk</text></g>
<g filter="url(#shadow)"><rect x="430" y="192" width="250" height="335" rx="20" fill="#263b65"/><text x="460" y="230" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#9de9ff">LEARNING OUTCOMES</text><text x="460" y="272" class="white" style="font-size:18px">Performance</text><text x="460" y="306" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d9e7ff">Mastery gain</text><text x="460" y="332" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d9e7ff">Correctness</text><text x="460" y="358" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#d9e7ff">Effort and hint use</text><rect x="460" y="426" width="190" height="58" rx="12" fill="#334f82"/><text x="478" y="451" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d9e7ff">Output:</text><text x="478" y="471" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#d9e7ff">student outcomes</text></g>
<g filter="url(#shadow)"><rect x="778" y="192" width="250" height="335" rx="20" fill="#fff" stroke="#cbd7e6"/><text x="806" y="230" class="tag">HUMAN FACTORS</text><text x="806" y="272" class="t">Trust and dependence</text><text x="806" y="306" class="b">Trust calibration</text><text x="806" y="332" class="b">Independence score</text><text x="806" y="358" class="b">Over-reliance risk</text><rect x="806" y="426" width="190" height="58" rx="12" fill="#fff0db"/><text x="824" y="451" class="small">Output:</text><text x="824" y="471" class="small">risk indicators</text></g>
<g filter="url(#shadow)"><rect x="1126" y="192" width="250" height="335" rx="20" fill="#453823"/><text x="1154" y="230" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#ffe4a6">FAIRNESS REVIEW</text><text x="1154" y="272" class="white" style="font-size:18px">Subgroup audit</text><text x="1154" y="306" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Learning gaps</text><text x="1154" y="332" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Over-reliance gaps</text><text x="1154" y="358" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#f2dfc6">Teacher review</text><rect x="1154" y="426" width="190" height="58" rx="12" fill="#574629"/><text x="1172" y="451" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#ffe8bf">No high-stakes</text><text x="1172" y="471" style="font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#ffe8bf">decisions</text></g>
<path d="M332 360 H418" stroke="#5b6f91" stroke-width="3" marker-end="url(#arr)"/><path d="M680 360 H766" stroke="#5b6f91" stroke-width="3" marker-end="url(#arr)"/><path d="M1028 360 H1114" stroke="#5b6f91" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="250" y="585" width="940" height="54" rx="17" fill="#f7efff" stroke="#c9a7ee"/><text x="285" y="619" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#21324f">Ethics rule:</text><text x="382" y="619" style="font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#4c607a">real learner deployment requires consent, privacy, accessibility, educator oversight, and ethics review.</text></g>
</svg>
