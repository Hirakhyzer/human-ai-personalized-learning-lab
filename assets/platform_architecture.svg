<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="790" viewBox="0 0 1440 790" role="img" aria-labelledby="title desc">
<title id="title">Human-AI personalized learning lab architecture</title><desc id="desc">Conceptual research architecture from synthetic learner activity through adaptive feedback, learning outcomes, trust and dependence analysis, fairness audit, reports, and human review.</desc>
<defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#10162c"/><stop offset="1" stop-color="#263b65"/></linearGradient><linearGradient id="a" x1="0" x2="1"><stop stop-color="#7dd3fc"/><stop offset="1" stop-color="#c084fc"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".30"/></filter><marker id="arr" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#c7ddff"/></marker><style>.h{font-family:Arial,Helvetica,sans-serif;font-size:34px;font-weight:700;fill:#f8fbff}.s{font-family:Arial,Helvetica,sans-serif;font-size:16px;fill:#c9d7ef}.t{font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;fill:#fff}.b{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#dbe7ff}.tiny{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#aebddb}.tag{font-family:Arial,Helvetica,sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;fill:#9de9ff}.num{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#10162c}</style></defs>
<rect width="1440" height="790" fill="url(#bg)"/><circle cx="1260" cy="90" r="190" fill="#6d5cff" opacity=".16"/><circle cx="130" cy="760" r="235" fill="#00b7c7" opacity=".13"/>
<text x="70" y="76" class="h">Human-AI Collaboration for Personalized Learning</text><text x="70" y="108" class="s">Synthetic-first research platform for adaptive feedback, learning gains, dependence, trust calibration, and fairness.</text><line x1="70" y1="140" x2="1370" y2="140" stroke="#49658f"/>
<g filter="url(#shadow)"><rect x="70" y="190" width="250" height="214" rx="18" fill="#1a2947" stroke="#607aa9"/><rect x="94" y="214" width="42" height="26" rx="13" fill="url(#a)"/><text x="109" y="233" class="num">01</text><text x="94" y="274" class="t">Synthetic learners</text><text x="94" y="307" class="b">Prior knowledge</text><text x="94" y="333" class="b">Learning speed</text><text x="94" y="359" class="b">Confidence and support needs</text><text x="94" y="386" class="tiny">No real student data committed</text></g>
<g filter="url(#shadow)"><rect x="390" y="190" width="250" height="214" rx="18" fill="#1a2947" stroke="#607aa9"/><rect x="414" y="214" width="42" height="26" rx="13" fill="url(#a)"/><text x="429" y="233" class="num">02</text><text x="414" y="274" class="t">Feedback conditions</text><text x="414" y="307" class="b">No feedback baseline</text><text x="414" y="333" class="b">Generic feedback</text><text x="414" y="359" class="b">Adaptive and overhelpful AI</text><text x="414" y="386" class="tiny">Designed to study benefit and risk</text></g>
<g filter="url(#shadow)"><rect x="710" y="190" width="250" height="214" rx="18" fill="#1a2947" stroke="#607aa9"/><rect x="734" y="214" width="42" height="26" rx="13" fill="url(#a)"/><text x="749" y="233" class="num">03</text><text x="734" y="274" class="t">Outcome engine</text><text x="734" y="307" class="b">Mastery gain</text><text x="734" y="333" class="b">Hint use and independence</text><text x="734" y="359" class="b">Trust calibration</text><text x="734" y="386" class="tiny">Learning plus human factors</text></g>
<g filter="url(#shadow)"><rect x="1030" y="190" width="340" height="214" rx="18" fill="#1a2947" stroke="#607aa9"/><rect x="1054" y="214" width="42" height="26" rx="13" fill="url(#a)"/><text x="1069" y="233" class="num">04</text><text x="1054" y="274" class="t">Audit and fairness</text><text x="1054" y="307" class="b">Subgroup learning gaps</text><text x="1054" y="333" class="b">Dependence and over-trust risk</text><text x="1054" y="359" class="b">Hash-chained experiment record</text><text x="1054" y="386" class="tiny">Human review required</text></g>
<path d="M320 296 H382" stroke="#c7ddff" stroke-width="3" marker-end="url(#arr)"/><path d="M640 296 H702" stroke="#c7ddff" stroke-width="3" marker-end="url(#arr)"/><path d="M960 296 H1022" stroke="#c7ddff" stroke-width="3" marker-end="url(#arr)"/>
<g filter="url(#shadow)"><rect x="120" y="520" width="350" height="178" rx="18" fill="#123d4a" stroke="#55b5c6"/><text x="146" y="555" class="tag">LEARNING ANALYTICS</text><text x="146" y="592" class="t">Mastery and feedback quality</text><text x="146" y="623" class="b">Pre/post gain estimates</text><text x="146" y="649" class="b">Challenge fit and task adaptation</text><text x="146" y="675" class="tiny">Generated from synthetic sessions</text></g>
<g filter="url(#shadow)"><rect x="545" y="520" width="350" height="178" rx="18" fill="#40345a" stroke="#9c7dda"/><text x="571" y="555" class="tag">HUMAN FACTORS</text><text x="571" y="592" class="t">Trust and dependence</text><text x="571" y="623" class="b">Over-reliance risk</text><text x="571" y="649" class="b">Trust calibration vs accuracy</text><text x="571" y="675" class="tiny">Prevents blind AI adoption claims</text></g>
<g filter="url(#shadow)"><rect x="970" y="520" width="350" height="178" rx="18" fill="#3d351f" stroke="#c9a85a"/><text x="996" y="555" class="tag">ETHICS AND FAIRNESS</text><text x="996" y="592" class="t">Subgroup audit and reports</text><text x="996" y="623" class="b">Fairness gaps</text><text x="996" y="649" class="b">Teacher/researcher review boundary</text><text x="996" y="675" class="tiny">Not a real learner decision system</text></g>
<text x="70" y="750" class="tiny">Real studies require consent, ethics review, privacy controls, accessibility review, educator oversight, and careful statistical design.</text>
</svg>
